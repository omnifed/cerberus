name: Security Audit

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  pnpm-audit:
    name: Run pnpm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Dependency Audit
        # The step will automatically fail if vulnerabilities are found
        run: pnpm audit --audit-level=high
