name: 💅 Lint Checks

on: [merge_group, pull_request]

permissions:
  contents: read

jobs:
  lint-ox:
    runs-on: ubuntu-latest
    name: Oxlint valid
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: '22'

      - run: pnpm install
      - run: pnpm run lint:ox

  lint-ts:
    runs-on: ubuntu-latest
    name: TS valid
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: '22'

      - run: pnpm install
      - run: pnpm run lint
