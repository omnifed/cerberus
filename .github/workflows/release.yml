# NPM forces us to use a single file for publishing

name: 🚀 Release Pipeline

on:
  push:
    branches:
      - main

# Prevent parallel runs from colliding
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # Required to push tags and commits
  pull-requests: write # Required for Changesets to open the PR
  id-token: write # STRICTLY REQUIRED for NPM OIDC & JSR

jobs:
  release-pipeline:
    name: Manage Release Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 26
          registry-url: 'https://registry.npmjs.org' # Required to establish OIDC audience

      - uses: oven-sh/setup-bun@v2
      - uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Install Dependencies
        run: pnpm install && deno install

      # ====================================================================
      # PATH A: STABLE PUBLISH
      # Runs ONLY when you merge the automated "Version Packages" PR
      # ====================================================================
      - name: Publish Stable Packages
        if: startsWith(github.event.head_commit.message, 'chore(release)')
        run: cd configs && bun ./src/publish-stable.mjs

      - name: Create GitHub Release Tag
        if: startsWith(github.event.head_commit.message, 'chore(release)')
        run: |
          # Use React package as the source of truth for the workspace version
          VERSION=$(node -p "require('./packages/react/package.json').version")
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ====================================================================
      # PATH B: BOT PR & CANARY PUBLISH
      # Runs on normal feature PR merges
      # ====================================================================
      - name: Create Version PR
        if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Canary Versions
        if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
        run: |
          # The Changesets action leaves the runner on the PR branch if it made an update.
          # We MUST return to a clean main branch state before generating the snapshot.
          git checkout main
          git reset --hard origin/main

          pnpm changeset version
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          cd configs && bun ./src/bump-versions.mjs --next --commit=$SHORT_SHA

      - name: Publish Canary Packages
        if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
        run: cd configs && bun ./src/publish-canary.mjs
