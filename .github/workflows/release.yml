# NPM Forces us to use a single workflow for publishing - meaning we cannot scope
# canary/stable to their own files and still be allowed to publish to NPM

name: 🚀 Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # <-- Allows manual triggering to catch up on missed releases

# Prevent parallel runs from colliding
concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: true
  HUSKY: 0 # Instructs Husky to skip hooks in this environment

permissions:
  contents: write # Required to push tags and commits
  pull-requests: write # Required for Changesets to open the PR
  id-token: write # STRICTLY REQUIRED for NPM OIDC & JSR

jobs:
  # ====================================================================
  # PATH B: BOT PR & CANARY PUBLISH
  # Runs on normal feature PR merges
  # ====================================================================
  canary-pipeline:
    name: Canary Pipeline
    if: "!contains(github.event.head_commit.message, 'chore(release): version packages') && github.event_name != 'workflow_dispatch'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 26
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
      - uses: denoland/setup-deno@v2
        with:
          cache: true

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile && deno install && pnpm --filter styled-system run prepare

      - name: Create Version PR
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Canary Versions
        run: |
          git checkout main
          git reset --hard origin/main
          pnpm changeset version
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          cd configs && bun ./src/bump-versions.mjs --next --commit=$SHORT_SHA

      - name: Publish Canary Packages
        run: cd configs && bun ./src/publish-canary.mjs

  # ====================================================================
  # PATH A: STABLE PUBLISH
  # Runs when Version PR is merged OR triggered manually
  # Due to no changeset from versioning existing we have to publish
  # manually via workflow dispatch to keep pnpm context
  # ====================================================================
  npm-publish-react:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: NPM - Publish React
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install
      - run: pnpm build && pnpm publish --tag latest --access public --no-git-checks
        working-directory: ./packages/react

  npm-publish-signals:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: NPM - Publish Signals
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install
      - run: pnpm build && pnpm publish --tag latest --access public --no-git-checks
        working-directory: ./packages/signals

  npm-publish-data-grid:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: NPM - Publish Data Grid
    needs: [npm-publish-react, npm-publish-signals]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install
      - run: pnpm build && pnpm publish --tag latest --access public --no-git-checks
        working-directory: ./packages/data-grid

  jsr-publish-figma:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: JSR - Publish Figma
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - uses: denoland/setup-deno@v2
        with:
          cache: true

      - run: pnpm install && deno install
      - run: deno publish --allow-dirty
        working-directory: ./packages/figma
        continue-on-error: true # Bypasses the known Base64url provenance decoding bug

  jsr-publish-tokens:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: JSR - Publish Tokens
    needs: jsr-publish-figma
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - uses: denoland/setup-deno@v2
        with:
          cache: true

      - run: pnpm install && deno install
      - run: deno publish --allow-dirty
        working-directory: ./packages/tokens
        continue-on-error: true # Bypasses the known Base64url provenance decoding bug

  jsr-publish-preset-acheron:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: JSR - Publish Acheron Theme
    needs: jsr-publish-tokens
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - uses: denoland/setup-deno@v2
        with:
          cache: true

      - run: pnpm install && deno install
      - run: deno publish --allow-dirty
        working-directory: ./packages/preset-acheron-theme
        continue-on-error: true # Bypasses the known Base64url provenance decoding bug

  jsr-publish-preset-cerberus:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: JSR - Publish Cerberus Theme
    needs: jsr-publish-tokens
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - uses: denoland/setup-deno@v2
        with:
          cache: true

      - run: pnpm install && deno install
      - run: deno publish --allow-dirty
        working-directory: ./packages/preset-cerberus-theme
        continue-on-error: true # Bypasses the known Base64url provenance decoding bug

  jsr-publish-preset-elysium:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: JSR - Publish Elysium Theme
    needs: jsr-publish-tokens
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - uses: denoland/setup-deno@v2
        with:
          cache: true

      - run: pnpm install && deno install
      - run: deno publish --allow-dirty
        working-directory: ./packages/preset-elysium-theme
        continue-on-error: true # Bypasses the known Base64url provenance decoding bug

  jsr-publish-preset:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: JSR - Publish Preset
    needs: jsr-publish-preset-cerberus
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - uses: denoland/setup-deno@v2
        with:
          cache: true

      - run: pnpm install && deno install
      - run: deno publish --allow-dirty
        working-directory: ./packages/panda-preset
        continue-on-error: true # Bypasses the known Base64url provenance decoding bug

  create-release-tag:
    if: "contains(github.event.head_commit.message, 'chore(release): version packages') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    name: Create GitHub Release Tag
    needs:
      - npm-publish-data-grid
      - jsr-publish-preset-acheron
      - jsr-publish-preset-elysium
      - jsr-publish-preset
    steps:
      - uses: actions/checkout@v7

      - name: Create GitHub Release Tag
        run: |
          # Use React package as the source of truth for the workspace version
          VERSION=$(node -p "require('./packages/react/package.json').version")
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
