name: 🧪 Publish Pre-Release Snapshot

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.changeset/**'
      - '**/package.json'
      - '**/deno.json'
      - 'CHANGELOG.md'

jobs:
  snapshot:
    name: Build & Publish Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: 26
      - uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: pnpm install

      # This generates transient versions (e.g., 1.5.0-next-20260603) in package.json
      - name: Generate Snapshot Versions
        run: pnpm changeset version --snapshot next

      # Sync those temporary next versions over to deno.json
      - name: Sync Deno Versions
        run: bun ./src/bump-versions.mjs
        working-directory: configs

      # Now execute your publishing steps sequentially (or invoke your publishing scripts)
      - name: Build and Publish Packages
        run: |
          cd packages/react && pnpm build && pnpm publish --tag next --access public --no-git-checks

        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
