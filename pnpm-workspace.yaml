nodeVersion: 24.16.0
engineStrict: true

packages:
  - packages/*
  - tests
  - bench
  - configs
  - docs
  - styled-system

catalogs:
  oxc:
    oxfmt: ^0.59.0
  ark:
    '@ark-ui/react': ^5.37.2
  pandacss:
    '@pandacss/dev': ^1.11.4
    '@pandacss/preset-panda': ^1.11.4
    '@pandacss/types': ^1.11.4
  jsx:
    '@carbon/icons-react': ^11.83.0
    globby: ^16.2.2
    react: ^19.2.7
    react-dom: ^19.2.7
    '@types/react': ^19.2.17
    '@types/react-dom': ^19.2.3
    vite: ^8.0.16
    vite-plugin-dts: ^5.0.2
    '@vitejs/plugin-react': ^6.0.3
    '@typescript/typescript6': ^6.0.0 # required for vite-dts

allowBuilds:
  '@carbon/icon-helpers': true
  '@carbon/icons-react': true
  '@tsparticles/engine': true
  bun: true
  esbuild: true
  sharp: true
  unrs-resolver: true

auditConfig:
  # Only non-package related allowed here
  ignoreGhsas:
    - GHSA-h67p-54hq-rp68 # changeset
    - GHSA-qx2v-qp2m-jg93 # postcss (docs)

overrides:
  # pandacss
  brace-expansion: '>=5.0.6'
  # docs
  '@eslint/eslintrc>ajv': '^6.12.6'
  eslint>ajv: '^6.12.6'
