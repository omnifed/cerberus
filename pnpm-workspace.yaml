nodeVersion: 24.16.0
engineStrict: true

packages:
  - packages/*
  - tests
  - bench
  - configs
  - docs
  - styled-system

allowBuilds:
  '@carbon/icon-helpers': true
  '@carbon/icons-react': true
  '@tsparticles/engine': true
  bun: true
  esbuild: true
  sharp: true
  unrs-resolver: true

overrides:
  # pandacss
  brace-expansion: '>=5.0.6'
  # docs
  '@babel/core': '>=7.29.1'
  '@eslint/eslintrc>ajv': '^6.12.6'
  postcss: '>=8.5.10'
  eslint>ajv: '^6.12.6'
  # tools
  js-yaml: '>=4.1.2'
